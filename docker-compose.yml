version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: Siddhant1512!
      POSTGRES_DB: chatbot_db
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    restart: always
    ports:
      - "8000:8000"
    env_file:
      - .env                          # ← Best practice: load all secrets from .env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - .:/app
      - /app/migrations/versions
    command: uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload

  streamlit:
    build:
      context: .
      dockerfile: Dockerfile.streamlit
    restart: always
    ports:
      - "8501:8501"
    env_file:
      - .env
    environment:
      - DOCKER_ENV=true
    depends_on:
      - fastapi
    volumes:
      - .:/app
    command: streamlit run src/main.py --server.port=8501 --server.address=0.0.0.0

volumes:
  pgdata:
  redisdata: